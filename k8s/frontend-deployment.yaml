apiVersion: apps/v1
kind: Deployment
metadata:
  name: spotify-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spotify-frontend
  template:
    metadata:
      labels:
        app: spotify-frontend
    spec:
      containers:
        - name: spotify-frontend
          image: spotify-frontend:v1
          ports:
            - containerPort: 3000
